type: object
required:
  - user_id
  - birthday
  - is_male
properties:
  user_id:
    type: integer
  birthday:
    type: string
    format: date
  is_male:
    type: boolean
  height:
    type: number
    format: float
  height_updated_at:
    type: string
    format: date-time
  height_checked_at:
    type: string
    format: date-time
  weight:
    type: number
    format: float
  weight_updated_at:
    type: string
    format: date-time
  weight_checked_at:
    type: string
    format: date-time
  club_id:
    type: integer
