post:
  tags:
    - sportsmen_sanction
  summary: Add a sanction to a sportsman
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/SportsmenSanctionRequest.yaml
  responses:
    '201':
      description: Sanction was added to sportsman
    '400':
      description: Operation failed
get:
  tags:
    - sportsmen_sanction
  summary: Get all sanctions for all sportsmen
  responses:
    '200':
      description: List of all sportsmen sanctions
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/SportsmenSanctionResponse.yaml
    '400':
      description: Operation failed
