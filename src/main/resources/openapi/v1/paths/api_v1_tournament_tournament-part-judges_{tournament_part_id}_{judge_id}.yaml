put:
  tags:
    - tournament
  summary: Update judge for a tournament part
  parameters:
    - in: path
      name: tournament_part_id
      required: true
      schema:
        type: integer
      description: Tournament Part ID
    - in: path
      name: judge_id
      required: true
      schema:
        type: integer
      description: Judge ID
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components\schemas\TournamentPartJudgeRequest.yaml
  responses:
    '200':
      description: Judge status updated
      content:
        application/json:
          schema:
            $ref: ..\components\schemas\TournamentPartJudgeResponse.yaml
    '400':
      description: Operation was failed
delete:
  tags:
    - tournament
  summary: Remove a judge from a tournament part
  parameters:
    - in: path
      name: tournament_part_id
      required: true
      schema:
        type: integer
      description: Tournament Part ID
    - in: path
      name: judge_id
      required: true
      schema:
        type: integer
      description: Judge ID
  responses:
    '204':
      description: Judge removed from the tournament part
    '400':
      description: Operation was failed
