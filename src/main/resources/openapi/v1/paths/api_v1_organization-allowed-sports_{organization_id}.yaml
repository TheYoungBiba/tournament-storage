get:
  tags:
    - organization
  summary: Get allowed sports for an organization
  parameters:
    - in: path
      name: organization_id
      required: true
      schema:
        type: integer
      description: Organization ID
  responses:
    '200':
      description: List of allowed sports
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/OrganizationAllowedSportResponse.yaml
    '400':
      description: Operation was failed
