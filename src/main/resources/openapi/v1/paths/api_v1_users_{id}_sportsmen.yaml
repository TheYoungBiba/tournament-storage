post:
  tags:
    - user
  summary: To add sportsman role for user
  parameters:
    - in: path
      name: id
      required: true
      schema:
        type: integer
  requestBody:
    description: The sportsmen data
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/SportsmenRequest.yaml
  responses:
    '201':
      description: Role was added successful
    '400':
      description: Operation was failed
delete:
  tags:
    - user
  summary: To delete sportsman role by id
  parameters:
    - in: path
      name: id
      required: true
      schema:
        type: integer
      description: User id
  responses:
    '204':
      description: Removable was successful
    '400':
      description: Operation was failed
