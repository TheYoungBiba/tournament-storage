get:
  tags:
    - user
  summary: To get sportsman data by ID
  parameters:
    - in: path
      name: id
      required: true
      schema:
        type: integer
  responses:
    '200':
      description: Operation was successfful
      content:
        application/json:
          schema:
            $ref: ../components/schemas/SportsmenSportResponse.yaml
    '400':
      description: Operation was failed
put:
  tags:
    - user
  summary: To update sportsman data in sport by ID
  parameters:
    - in: path
      name: id
      required: true
      schema:
        type: integer
  requestBody:
    description: The updated sportsman data
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/SportsmenSportRequest.yaml
  responses:
    '201':
      description: Operation was successful
    '400':
      description: Operation was failed
delete:
  tags:
    - user
  summary: To remove sportsman from sport by ID
  parameters:
    - in: path
      name: id
      required: true
      schema:
        type: integer
  responses:
    '204':
      description: Sportsman was removed from sport
    '400':
      description: Operation was failed
