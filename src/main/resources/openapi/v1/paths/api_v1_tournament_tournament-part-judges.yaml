post:
  tags:
    - tournament
  summary: Add a judge to a tournament part
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/TournamentPartJudgeRequest.yaml
  responses:
    '201':
      description: Judge added to the tournament part
      content:
        application/json:
          schema:
            $ref: ../components/schemas/TournamentPartJudgeResponse.yaml
    '400':
      description: Operation was failed
