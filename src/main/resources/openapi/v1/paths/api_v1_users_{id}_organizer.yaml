post:
  tags:
    - user
  summary: To add organizer role
  parameters:
    - in: path
      name: id
      required: true
      schema:
        type: integer
  requestBody:
    description: The organizer data
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/OrganizerRequest.yaml
  responses:
    '201':
      description: The role was added
    '400':
      description: Operation was failed
delete:
  tags:
    - user
  summary: To delete organizer role by id
  parameters:
    - in: path
      name: id
      required: true
      schema:
        type: integer
      description: User id
  responses:
    '204':
      description: Removable was successful
