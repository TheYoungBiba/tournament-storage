delete:
  tags:
    - organization
  summary: Remove allowed sport from organization
  parameters:
    - in: path
      name: organization_id
      required: true
      schema:
        type: integer
      description: Organization ID
    - in: path
      name: sport_id
      required: true
      schema:
        type: integer
      description: Sport ID
  responses:
    '204':
      description: Sport removed from organization
    '400':
      description: Operation was failed
