post:
  tags:
    - organization
  summary: Create a new organization
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/OrganizationRequest.yaml
  responses:
    '201':
      description: Organization was created
    '400':
      description: Operation was failed
get:
  tags:
    - organization
  summary: Show all organizations
  responses:
    '200':
      description: List of organizations
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/OrganizationResponse.yaml
    '400':
      description: Operation was failed
