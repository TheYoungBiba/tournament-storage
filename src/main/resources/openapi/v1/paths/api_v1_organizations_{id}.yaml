get:
  tags:
    - organization
  summary: Get organization by ID
  parameters:
    - in: path
      name: id
      required: true
      schema:
        type: integer
      description: Organization ID
  responses:
    '200':
      description: Organization details
      content:
        application/json:
          schema:
            $ref: ../components/schemas/OrganizationResponse.yaml
    '404':
      description: Organization not found
put:
  tags:
    - organization
  summary: Update organization by ID
  parameters:
    - in: path
      name: id
      required: true
      schema:
        type: integer
      description: Organization ID
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/OrganizationRequest.yaml
  responses:
    '200':
      description: Organization updated
    '400':
      description: Operation was failed
delete:
  tags:
    - organization
  summary: Delete organization by ID
  parameters:
    - in: path
      name: id
      required: true
      schema:
        type: integer
      description: Organization ID
  responses:
    '204':
      description: Organization deleted
    '400':
      description: Operation was failed
