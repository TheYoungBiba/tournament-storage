put:
  tags:
    - tournament
  summary: Change a tournament details
  parameters:
    - in: path
      name: id
      required: true
      schema:
        type: integer
  requestBody:
    description: All the details data
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/TournamentRequest.yaml
  responses:
    '201':
      description: Operation was successful
    '400':
      description: Operation was failed
delete:
  tags:
    - tournament
  summary: Delete the existing tournament by Id
  parameters:
    - in: path
      name: id
      required: true
      schema:
        type: integer
  responses:
    '204':
      description: Operation was successful
    '400':
      description: Operation was failed
