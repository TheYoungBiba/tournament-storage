    post:
      tags:
        - user
      summary: "Create new user"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
      responses:
        '201':
          description: "User was created"
        '400':
          description: "Operation was failed"
          
    get:
      tags:
        - user
      summary: "Show all the existed users"
      description: "To get list of every user from database"
      responses:
        '200':
          description: "operation was successful"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'
        '400':
          description: "operation was failed"

components:
  schemas:
    UserRequest:
      type: object
      required:
        - login
        - email
        - phone_number
        - password
      properties:
        login:
          type: string
        email:
          type: string
          format: email
        phone_number:
          type: string
        photo_id:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        patronymic:
          type: string
        password:
          type: string

    UserResponse:
      type: object
      required:
        - login
        - email
        - phone_number
        - password
      properties:
        login:
          type: string
        email:
          type: string
          format: email
        phone_number:
          type: string
        photo_id:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        patronymic:
          type: string
        password:
          type: string