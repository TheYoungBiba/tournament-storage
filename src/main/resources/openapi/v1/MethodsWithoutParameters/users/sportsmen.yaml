    get:
      tags:
        - user
      summary: "Show all the existed sportsmen"
      description: "To get list of every sportsman from database"
      responses:
        '200':
          description: "operation was successful"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SportsmenResponse'
        '400':
          description: "operation was failed"

components:
