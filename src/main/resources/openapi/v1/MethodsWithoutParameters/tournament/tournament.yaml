    get:
      tags:
        - tournament
      summary: "Shows all the existed tournaments"
      description: "All the tournaments from every sport direction"
      responses:
        '200':
          description: "operation was successful"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TournamentResponse'
        '400':
          description: "operation was failed"

    post:
      summary: "Make a new tournament"
      requestBody:
        description: "All the details data"
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TournamentRequest'
      responses:
        '201':
          description: "Operation was successful"
        '400':
          description: "Operation was failed"




components:
  schemas:
    TournamentRequest:
      type: object
      required:
        - name
        - place
        - start_time
        - end_time
        - is_official
        - tournament_parts
      properties:
        name:
          type: string
        sport_id:
          type: integer
        place:
          type: string
        start_time:
          type: string
          format: date
        end_time:
          type: string
          format: date
        is_official:
          type: boolean
        participation_fee:
          type: integer
        max_count_commands:
          type: integer
        tournament_parts:
          type: array
          items:
            $ref: '#/components/schemas/TournamentPartRequest'

    TournamentResponse:
      type: object
      required:
        - name
        - place
        - start_time
        - end_time
        - is_official
        - tournament_parts
      properties:
        name:
          type: string
        sport_id:
          type: integer
        place:
          type: string
        start_time:
          type: string
          format: date
        end_time:
          type: string
          format: date
        is_official:
          type: boolean
        participation_fee:
          type: integer
        max_count_commands:
          type: integer
        tournament_parts:
          type: array
          items:
            $ref: '#/components/schemas/TournamentPartResponse'

    TournamentPartRequest:
      type: object
      required:
        - name
        - start_time
        - end_time
        - category_id
      properties:
        name:
          type: string
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        category_id:
          type: integer
        tournament_part_teams:
          type: array
          items:
            $ref: '#/components/schemas/TournamentPartTeamRequest'

    TournamentPartResponse:
      type: object
      required:
        - name
        - start_time
        - end_time
        - category_id
      properties:
        name:
          type: string
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        category_id:
          type: integer
        tournament_part_teams:
          type: array
          items:
            $ref: '#/components/schemas/TournamentPartTeamResponse'

    TournamentPartTeamRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        result:
          type: integer

    TournamentPartTeamResponse:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        result:
          type: integer