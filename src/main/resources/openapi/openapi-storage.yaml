  /api/v1/users/organizer:
    $ref: './v1/MethodsWithoutParameters/users/organizer.yaml'
          
  /api/v1/users/{id}/organizer:
    $ref: './v1/MethodsWithParameters/users/organizer.yaml'

  /api/v1/users/sportsmen_sport/sportsmen_achievements:
    $ref: './v1/MethodsWithoutParameters/users/sportsmen_achievements.yaml'
         
