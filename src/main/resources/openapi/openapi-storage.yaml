  /api/v1/users:
    $ref: './v1/MethodsWithoutParameters/users/users.yaml'
        
  /api/v1/users/{id}:
    $ref: './v1/MethodsWithParameters/users/users.yaml'

  /api/v1/users/sportsmen:
    $ref: './v1/MethodsWithoutParameters/users/sportsmen.yaml'

  /api/v1/users/{id}/sportsmen:
    $ref: './v1/MethodsWithParameters/users/sportsmen.yaml'
         
  /api/v1/users/sportsmen_sport:
    $ref: './v1/MethodsWithoutParameters/users/sportsmen_sport.yaml'

  /api/v1/users/{id}/sportsmen_sport:
    $ref: './v1/MethodsWithParameters/users/sportsmen_sport.yaml'

  /api/v1/users/tournament_maker:
    $ref: './v1/MethodsWithoutParameters/users/tournament_maker.yaml'
  
  /api/v1/users/{id}/tournament_maker:
    $ref: './v1/MethodsWithParameters/users/tournament_maker.yaml'

  /api/v1/users/legal_tournament_maker:
