openapi: 3.0.2
info:
  title: "tournament-storage"
  description: "It's easy to manage your sport tournament or league"
  version: "1.0"
  contact:
    name: "SportManager"
    url: "https://sportmanager.com/support"
    email: "sportmanager@gmail.com"
tags:
  - name: tournament
    description: "Everything about tournaments"

paths:
  /api/v1/tournament:
    get:
      tags:
        - tournament
      operationId: getTournaments
      summary: "Shows all the existed tournaments"
      description: "All the tournaments from every sport direction"
      responses:
        '200':
          description: "Operation was successful"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TournamentResponse'
        '400':
          description: "Bad request"
        '404':
          description: "Not found"
        '500':
          description: "Internal Server Error"

    post:
      operationId: createTournament 
      summary: "Make a new tournament"
      requestBody:
        description: "All the details data"
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TournamentRequest'
      responses:
        '201':
          description: "Operation was successful"
        '400':
          description: "Bad request"
        '500':
          description: "Internal Server Error"



  /api/v1/tournament/{id}:
    put:
      tags:
        - tournament
      operationId: updateTournament
      summary: "Change a tournament details"
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        description: "All the details data"
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TournamentRequest'
      responses:
        '201':
          description: "Operation was successful"
        '400':
          description: "Bad request"
        '500':
          description: "Internal Server Error"
              
    delete:
      tags:
        - tournament
      operationId: removeTournament
      summary: "Delete the existing tournament by Id"
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: "Operation was successful"
        '400':
          description: "Bad request"
        '500':
          description: "Internal Server Error"

  /api/v1/tournament/tournament-part-judges:
    post:
      tags:
        - tournament
      operationId: addTournamentPartJudge
      summary: "Add a judge to a tournament part"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TournamentPartJudgeRequest'
      responses:
        '201':
          description: "Judge added to the tournament part"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TournamentPartJudgeResponse'
        '400':
          description: "Bad request"
        '500':
          description: "Internal Server Error"

  /api/v1/tournament/tournament-part-judges/{tournament_part_id}/{judge_id}:
    put:
      tags:
        - tournament
      operationId: updateTournamentPartJudge
      summary: "Update judge for a tournament part"
      parameters:
        - in: path
          name: tournament_part_id
          required: true
          schema:
            type: integer
          description: "Tournament Part ID"
        - in: path
          name: judge_id
          required: true
          schema:
            type: integer
          description: "Judge ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TournamentPartJudgeRequest'
      responses:
        '200':
          description: "Judge status updated"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TournamentPartJudgeResponse'
        '400':
          description: "Bad request"
        '500':
          description: "Internal Server Error"

    delete:
      tags:
        - tournament
      operationId: removeTournamentPartJudge
      summary: "Remove a judge from a tournament part"
      parameters:
        - in: path
          name: tournament_part_id
          required: true
          schema:
            type: integer
          description: "Tournament Part ID"
        - in: path
          name: judge_id
          required: true
          schema:
            type: integer
          description: "Judge ID"
      responses:
        '204':
          description: "Judge removed from the tournament part"
        '400':
          description: "Bad request"
        '500':
          description: "Internal Server Error"

  /api/v1/tournament/tournament-part-judges/{tournament_part_id}:
    get:
      tags:
        - tournament
      operationId:  getTournamentPartJudges
      summary: "Get a list of judges assigned to a tournament part"
      parameters:
        - in: path
          name: tournament_part_id
          required: true
          schema:
            type: integer
          description: "Tournament Part ID"
      responses:
        '200':
          description: "List of judges"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TournamentPartJudgeResponse'
        '400':
          description: "Bad request"
        '404':
          description: "Not found"
        '500':
          description: "Internal Server Error"

  /api/v1/tournament_maker_tournament:
    get:
      tags:
        - tournament
      summary: "Получить все записи организаторов турниров"
      responses:
        '200':
          description: "Успешно получены записи"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TournamentMakerTournamentResponse'
        '400':
          description: "Ошибка в запросе"

    post:
      tags:
        - tournament
      summary: "Создать новую запись для организатора турнира"
      requestBody:
        description: "Данные для создания новой записи"
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TournamentMakerTournamentRequest'
      responses:
        '201':
          description: "Запись успешно создана"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TournamentMakerTournamentResponse'
        '400':
          description: "Ошибка в запросе"

  /api/v1/tournament_maker_tournament/{id}:
    get:
      tags:
        - tournament
      summary: "Получить запись по ID"
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            description: "ID записи"
      responses:
        '200':
          description: "Запись успешно получена"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TournamentMakerTournamentResponse'
        '400':
          description: "Ошибка в запросе"

    put:
      tags:
        - tournament
      summary: "Обновить запись по ID"
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            description: "ID записи"
      requestBody:
        description: "Данные для обновления записи"
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TournamentMakerTournamentRequest'
      responses:
        '200':
          description: "Запись успешно обновлена"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TournamentMakerTournamentResponse'
        '400':
          description: "Ошибка в запросе"

    delete:
      tags:
        - tournament
      summary: "Удалить запись по ID"
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            description: "ID записи"
      responses:
        '200':
          description: "Запись успешно удалена"
        '400':
          description: "Ошибка в запросе"

components:
  schemas:
    TournamentRequest:
      type: object
      required:
        - name
        - place
        - start_time
        - end_time
        - is_official
        - tournament_parts
      properties:
        name:
          type: string
        sport_id:
          type: integer
        place:
          type: string
        start_time:
          type: string
          format: date
        end_time:
          type: string
          format: date
        is_official:
          type: boolean
        participation_fee:
          type: integer
        max_count_commands:
          type: integer
        tournament_parts:
          type: array
          items:
            $ref: '#/components/schemas/TournamentPartRequest'

    TournamentResponse:
      type: object
      required:
        - name
        - place
        - start_time
        - end_time
        - is_official
        - tournament_parts
      properties:
        name:
          type: string
        sport_id:
          type: integer
        place:
          type: string
        start_time:
          type: string
          format: date
        end_time:
          type: string
          format: date
        is_official:
          type: boolean
        participation_fee:
          type: integer
        max_count_commands:
          type: integer
        tournament_parts:
          type: array
          items:
            $ref: '#/components/schemas/TournamentPartResponse'

    TournamentPartRequest:
      type: object
      required:
        - name
        - start_time
        - end_time
        - category_id
      properties:
        name:
          type: string
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        category_id:
          type: integer
        tournament_part_teams:
          type: array
          items:
            $ref: '#/components/schemas/TournamentPartTeamRequest'

    TournamentPartResponse:
      type: object
      required:
        - name
        - start_time
        - end_time
        - category_id
      properties:
        name:
          type: string
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        category_id:
          type: integer
        tournament_part_teams:
          type: array
          items:
            $ref: '#/components/schemas/TournamentPartTeamResponse'

    TournamentPartTeamRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        result:
          type: integer

    TournamentPartTeamResponse:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        result:
          type: integer
          
    JudgeResponse:
      type: object
      required:
        - status_id
      properties:
        status_id:
          type: integer
          description: "ID статуса судьи"
          
    TournamentPartJudgeRequest:
      type: object
      required:
        - tournament_part_id
        - judge_id
        - judge_status_id
      properties:
        tournament_part_id:
          type: integer
        judge_id:
          type: integer
        judge_status_id:
          type: integer

    TournamentPartJudgeResponse:
      type: object
      properties:
        tournament_part_id:
          type: integer
        judge_id:
          type: integer
        judge_status_id:
          type: integer

    TournamentMakerTournamentRequest:
      type: object
      required:
        - tournament_maker_id
        - tournament_id
      properties:
        tournament_maker_id:
          type: integer
          description: "ID организатора турнира"
        tournament_id:
          type: integer
          description: "ID турнира"

    TournamentMakerTournamentResponse:
      type: object
      properties:
        tournament_maker_id:
          type: integer
          description: "ID организатора турнира"
        tournament_id:
          type: integer
          description: "ID турнира"
