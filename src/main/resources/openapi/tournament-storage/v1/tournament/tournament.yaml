          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NotFoundDto'
        '500':
          description: "Internal Server Error"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InternalErrorDto'

  /api/v1/tournament/tournament-part-judges/{tournament_part_id}:
    get:
      tags:
        - tournament
      operationId:  getTournamentPartJudges
      summary: "Get a list of judges assigned to a tournament part"
      parameters:
        - in: path
          name: tournament_part_id
          required: true
          schema:
            type: integer
          description: "Tournament Part ID"
      responses:
        '200':
          description: "List of judges"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TournamentPartJudgeResponse'
        '400':
          description: "Bad request"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BadRequestDto'
        '401':
          description: "Unauthorized"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UnauthorizedDto'
        '403':
          description: "Forbidden"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ForbiddenDto'
        '404':
          description: "Not found"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NotFoundDto'
        '500':
