components:
  schemas:
    TournamentRequest:
      type: object
      required:
        - name
        - place
        - start_time
        - end_time
        - is_official
        - tournament_parts
      properties:
        name:
          type: string
        sport_id:
          type: integer
        place:
          type: string
        start_time:
          type: string
          # format: date
        end_time:
          type: string
          # format: date
        is_official:
          type: boolean
        participation_fee:
          type: integer
        max_count_commands:
          type: integer
        tournament_parts:
          type: array
          items:
            $ref: '#/components/schemas/TournamentPartRequest'

    TournamentResponse:
      type: object
      required:
        - id
        - name
        - place
        - start_time
        - end_time
        - is_official
        - tournament_parts
      properties:
        id:
          type: integer
        name:
          type: string
        # sport_id:
        #   type: integer
        sport:
          type: string
        place:
          type: string
        start_time:
          type: string
          # format: date
        end_time:
          type: string
          # format: date
        is_official:
          type: boolean
        participation_fee:
          type: integer
        max_count_commands:
          type: integer
        tournament_parts:
          type: array
          items:
            $ref: '#/components/schemas/TournamentPartResponse'

    TournamentPartRequest:
      type: object
      required:
        - name
        - start_time
        - end_time
        - category_id
      properties:
        name:
          type: string
        start_time:
          type: string
          # format: date-time
        end_time:
          type: string
          # format: date-time
        category_id:
          type: integer
        tournament_part_teams:
          type: array
          items:
            $ref: '#/components/schemas/TournamentPartTeamRequest'

    TournamentPartResponse:
      type: object
      required:
        - id
        - name
        - start_time
        - end_time
        - category_id
      properties:
        id:
          type: integer
        name:
          type: string
        start_time:
          type: string
          # format: date-time
        end_time:
          type: string
          # format: date-time
        category_id:
          type: integer
        tournament_part_teams:
          type: array
          items:
            $ref: '#/components/schemas/TournamentPartTeamResponse'

    TournamentPartTeamRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        result:
          type: integer

    TournamentPartTeamResponse:
      type: object
      required:
        - name
        - id
      properties:
        id:
          type: integer
        name:
          type: string
        result:
          type: integer
          
    JudgeResponse:
      type: object
      required:
        - id
        - status_id
      properties:
        id:
          type: integer
        status_id:
          type: integer
          description: "Judge status ID"
    TournamentPartJudgeRequest:
      type: object
      required:
        - tournament_part_id
        - judge_id
        - judge_status_id
      properties:
        tournament_part_id:
          type: integer
        judge_id:
          type: integer
        judge_status_id:
          type: integer

    TournamentPartJudgeResponse:
      type: object
      required:
        - id
      properties:
        id:
          type: integer
        tournament_part_id:
          type: integer
        judge_id:
          type: string
        judge_status:
          type: string

    TournamentMakerTournamentRequest:
      type: object
      required:
        - tournament_maker_id
        - tournament_id
      properties:
        tournament_maker_id:
          type: integer
        tournament_id:
          type: integer

    TournamentMakerTournamentResponse:
      type: object
      required:
        - id
      properties:
        id:
          type: integer
        tournament_maker_id:
          type: integer
        tournament_id:
          type: integer

    BadRequestDto:
      type: object
      properties:
        message:
          type: string
        code:
          type: integer

    UnauthorizedDto:
      type: object
      properties:
        message:
          type: string
        code:
          type: integer

    ForbiddenDto:
      type: object
      properties:
        message:
          type: string
        code:
          type: integer

    NotFoundDto:
      type: object
      properties:
        message:
          type: string
        code:
          type: integer

    InternalErrorDto:
      type: object
      properties:
        message:
          type: string
        code:
          type: integer