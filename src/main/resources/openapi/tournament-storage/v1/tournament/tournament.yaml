            description: "Record ID"
      responses:
        '200':
          description: "Operation was successful"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TournamentMakerTournamentResponse'
        '400':
          description: "Bad request"
          content:
            application/json:
