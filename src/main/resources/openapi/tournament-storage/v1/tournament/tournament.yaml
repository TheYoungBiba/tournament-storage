                items:
                  $ref: '#/components/schemas/ForbiddenDto'
        '404':
          description: "Not found"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NotFoundDto'
        '500':
          description: "Internal Server Error"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InternalErrorDto'

  /api/v1/tournament/tournament-part-judges/{tournament_part_id}/{judge_id}:
    put:
      tags:
        - tournament
      operationId: updateTournamentPartJudge
      summary: "Update judge for a tournament part"
      parameters:
        - in: path
          name: tournament_part_id
          required: true
          schema:
            type: integer
          description: "Tournament Part ID"
        - in: path
          name: judge_id
          required: true
          schema:
            type: integer
          description: "Judge ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TournamentPartJudgeRequest'
      responses:
        '200':
          description: "Judge status updated"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TournamentPartJudgeResponse'
        '400':
          description: "Bad request"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BadRequestDto'
        '401':
          description: "Unauthorized"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UnauthorizedDto'
        '403':
          description: "Forbidden"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ForbiddenDto'
        '404':
          description: "Not found"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NotFoundDto'
        '500':
          description: "Internal Server Error"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InternalErrorDto'

    delete:
      tags:
        - tournament
      operationId: removeTournamentPartJudge
      summary: "Remove a judge from a tournament part"
      parameters:
        - in: path
          name: tournament_part_id
          required: true
          schema:
            type: integer
          description: "Tournament Part ID"
        - in: path
          name: judge_id
          required: true
          schema:
            type: integer
          description: "Judge ID"
      responses:
        '204':
          description: "Judge removed from the tournament part"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TournamentPartJudgeResponse'
        '400':
          description: "Bad request"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BadRequestDto'
        '401':
          description: "Unauthorized"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UnauthorizedDto'
        '403':
          description: "Forbidden"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ForbiddenDto'
        '404':
