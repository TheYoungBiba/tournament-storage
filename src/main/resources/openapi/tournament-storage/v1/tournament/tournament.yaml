      summary: "Remove record by ID"
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            description: "Record ID"
      responses:
        '204':
          description: "Judge removed from the tournament part"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TournamentMakerTournamentResponse'
        '400':
