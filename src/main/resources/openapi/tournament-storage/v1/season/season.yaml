components:
  schemas:
    SeasonRequest:
      type: object
      required:
        - name
        - sport_id
        - starts_at
        - ends_at
      properties:
        name:
          type: string
          description: "Название сезона"
        sport_id:
          type: integer
          description: "ID вида спорта"
        starts_at:
          type: string
          format: date-time
          description: "Дата и время начала сезона"
        ends_at:
          type: string
          format: date-time
          description: "Дата и время окончания сезона"

    SeasonResponse:
      type: object
      required:
        - id
      properties:
        id:
          type: integer
        name:
          type: string
          description: "Название сезона"
        sport_id:
          type: integer
          description: "ID вида спорта"
        starts_at:
          type: string
          format: date-time
          description: "Дата и время начала сезона"
        ends_at:
          type: string
          format: date-time
          description: "Дата и время окончания сезона"

    SeasonTournamentRequest:
      type: object
      required:
        - season_id
        - tournament_id
      properties:
        season_id:
          type: integer
          description: "ID сезона"
        tournament_id:
          type: integer
          description: "ID турнира"

    SeasonTournamentResponse:
      type: object
      required:
        - id
      properties:
        id:
          type: integer
        season_id:
          type: integer
          description: "ID сезона"
        tournament_id:
          type: integer
          description: "ID турнира"

    SeasonTournamentClubRequest:
      type: object
      required:
        - season_tournament_id
        - tournament_part_id
