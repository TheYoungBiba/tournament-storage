components:
  schemas:
    UserInfo:
      type: object
      required:
        - login
        - email
        - phone_number
        - password
      properties:
        login:
          type: string
        email:
          type: string
          format: email
        phone_number:
          type: string
        photo_id:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        patronymic:
          type: string
        password:
          type: string

    #Нужен для вывода всех юзеров, в остальных эндпоинтах можно заменить на связку UserInfo + Id
    UserInfoResponse:
      type: object
      required:
        - id
        - login
        - email
        - phone_number
        - password
      properties:
        id:
          type: integer
        login:
          type: string
        email:
          type: string
          format: email
        phone_number:
          type: string
        photo_id:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        patronymic:
          type: string
        password:
          type: string

    TournamentMakerRequest:
