openapi: 3.0.2
info:
  title: "tournament-storage"
  description: "It's easy to manage your sport tournament or league"
  version: "1.0"
  contact:
    name: "SportManager"
    url: "https://sportmanager.com/support"
    email: "sportmanager@gmail.com"
tags:
  - name: tournament
    description: "Everything about tournaments"
  - name: user
    description: "Everything about users"
  
paths:
  /api/v1/tournament:
    get:
      tags:
        - tournament
      operationId: getTournaments
      summary: "Shows all the existed tournaments"
      description: "All the tournaments from every sport direction"
      responses:
        '200':
          description: "Operation was successful"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TournamentResponse'
        '400':
          description: "Bad request"
        '404':
          description: "Not found"
        '500':
          description: "Internal Server Error"

    post:
      tags:
        - tournament
      operationId: createTournament
      summary: "Make a new tournament"
      requestBody:
        description: "All the details data"
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TournamentRequest'
      responses:
        '201':
          description: "Operation was successful"
        '400':
          description: "Bad request"
        '500':
          description: "Internal Server Error"



  /api/v1/tournament/{id}:
    put:
      tags:
        - tournament
      operationId: updateTournament
      summary: "Change a tournament details"
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        description: "All the details data"
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TournamentRequest'
      responses:
        '201':
          description: "Operation was successful"
        '400':
          description: "Bad request"
        '500':
          description: "Internal Server Error"
              
    delete:
      tags:
        - tournament
      operationId: removeTournament
      summary: "Delete the existing tournament by Id"
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: "Operation was successful"
        '400':
          description: "Bad request"
        '500':
          description: "Internal Server Error"

  /api/v1/users:
    post:
      tags:
        - user
      operationId: createUser
      summary: "Create new user"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
      responses:
        '201':
          description: "User was created"
        '400':
          description: "Bad request"
        '500':
          description: "Internal Server Error"

    get:
      tags:
        - user
      operationId: getUsers
      summary: "Show all the existed users"
      description: "To get list of every user from database"
      responses:
        '200':
          description: "Operation was successful"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'
        '400':
          description: "Bad request"
        '404':
          description: "Not found"
        '500':
          description: "Internal Server Error"

  /api/v1/users/{id}:
    get:
      tags:
        - user
      operationId: getUserById
      summary: "To get user by ID"
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: "Данные пользователя"
        '404':
          description: "Not found"
        '500':
          description: "Internal Server Error"

    put:
      tags:
        - user
      operationId: updateUserById
      summary: "To update user by ID"
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        description: "The data for user update"
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
      responses:
        '201':
          description: "Operation was successful"
        '400':
          description: "Bad request"
        '500':
          description: "Internal Server Error"          

    delete:
      tags:
        - user
      operationId: removeUserById
      summary: "To delete user by id"
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: "User id"
      responses:
        '204':
          description: "Removable was successful"
        '400':
          description: "Bad request" 
        '500':
          description: "Internal Server Error"

  /api/v1/users/sportsmen:
    get:
      tags:
        - user
      operationId: getSportsmen
      summary: "Show all the existed sportsmen"
      description: "To get list of every sportsman from database"
      responses:
        '200':
          description: "Operation was successful"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SportsmenResponse'
        '400':
          description: "Bad request"
        '404':
          description: "Not found"
        '500':
          description: "Internal Server Error"

  /api/v1/users/{id}/sportsmen:
    post:
      tags:
        - user
      operationId: getSportsmanById 
      summary: "To add sportsman role for user"
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        description: "The sportsmen data"
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SportsmenRequest'
      responses:
        '201':
          description: "Role was added successful"
        '400':
          description: "Bad request" 
        '500':
          description: "Internal Server Error"
          
    delete:
      tags:
        - user
      operationId: removeSportsmanById
      summary: "To delete sportsman role by id"
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: "User id"
      responses:
        '204':
         description: "Removable was successful"
        '400':
          description: "Bad request" 
        '500':
          description: "Internal Server Error"

         
  /api/v1/users/sportsmen_sport:
    post:
      tags:
        - user
      operationId: addNewSportForSportsman
